const container = document.createElement('div');

container.innerHTML = `
<details style="margin-top:20px;">
  <summary>View data table (accessible version of chart)</summary>
  <div id="table-container"></div>
</details>
`;

document.body.appendChild(container);

function generateTable(gd, levelIndex = 0) {
  const traces = gd.data;
  const nCategories = 3;

  const start = levelIndex * nCategories;
  const levelTraces = traces.slice(start, start + nCategories);

  const xValues = levelTraces[0].x;
  const levelName = levelIndex === 0 ? "Elementary" : "Middle";

  let html = `
    <table border="1" style="border-collapse:collapse; margin-top:10px;">
    <caption>${levelName} school choice by race/ethnicity, 2025</caption>
    <thead>
      <tr>
        <th scope="col">Race/Ethnicity</th>
  `;

  levelTraces.forEach(trace => {
    html += `<th scope="col">${trace.name}</th>`;
  });

  html += `</tr></thead><tbody>`;

  for (let i = 0; i < xValues.length; i++) {
    html += `<tr><td>${xValues[i]}</td>`;
    levelTraces.forEach(trace => {
      html += `<td>${trace.y[i]}%</td>`;
    });
    html += `</tr>`;
  }

  html += `</tbody></table>`;
  document.getElementById("table-container").innerHTML = html;
}

document.addEventListener("DOMContentLoaded", function() {
  const gd = document.querySelector('.plotly-graph-div');

  generateTable(gd, 0);

  gd.on('plotly_buttonclicked', function(event) {
    if (event.button.label === "Elementary") {
      generateTable(gd, 0);
    } else if (event.button.label === "Middle") {
      generateTable(gd, 1);
    }
  });
});
